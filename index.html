<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议桌牌自动排序工具</title>
<style>
/* ============================================================
   T1 · CSS 变量 & 基础样式
   色值来源：design/app/globals.css（OKLCH → CSS 变量）
   布局来源：DESIGN.md §5
   排版来源：DESIGN.md §2
   ============================================================ */

/* ----- 重置 ----- */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ----- CSS 变量：色值 Token ----- */
:root {
  /* 主色系 */
  --color-primary: oklch(0.5 0.13 235);
  --color-primary-foreground: oklch(0.99 0 0);

  /* 背景 & 前景 */
  --color-background: oklch(0.98 0.005 240);
  --color-foreground: oklch(0.2 0.02 250);

  /* 卡片 */
  --color-card: oklch(1 0 0);
  --color-card-foreground: oklch(0.2 0.02 250);

  /* 次级 */
  --color-secondary: oklch(0.95 0.01 240);
  --color-secondary-foreground: oklch(0.3 0.03 250);

  /* 辅助文字 */
  --color-muted: oklch(0.96 0.008 240);
  --color-muted-foreground: oklch(0.52 0.02 250);

  /* 边框 & 输入框 */
  --color-border: oklch(0.9 0.01 240);
  --color-input: oklch(0.9 0.01 240);

  /* 强调色 */
  --color-accent: oklch(0.92 0.04 200);
  --color-accent-foreground: oklch(0.3 0.06 235);

  /* 聚焦环 */
  --color-ring: oklch(0.5 0.13 235);

  /* 圆角 */
  --radius: 0.625rem;
  --radius-sm: calc(var(--radius) * 0.6);
  --radius-md: calc(var(--radius) * 0.8);
  --radius-lg: var(--radius);
  --radius-xl: calc(var(--radius) * 1.4);
}

/* ----- 排版 & 全局 ----- */
html {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background-color: var(--color-background);
  color: var(--color-foreground);
  min-height: 100vh;
}

/* ----- 页面容器 ----- */
.page-container {
  max-width: 1152px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* ----- 双栏布局 ----- */
#main {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 24px;
  align-items: start;
}

/* ----- 左侧栏 & 右侧栏子元素间距 ----- */
#left-panel,
#right-panel {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ----- 导航栏 ----- */
#navbar {
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid var(--color-border);
  background-color: oklch(1 0 0 / 0.8);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.navbar-inner {
  max-width: 1152px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
}

.navbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.navbar-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  border-radius: var(--radius-md);
  background-color: var(--color-primary);
  color: var(--color-primary-foreground);
  flex-shrink: 0;
}

.navbar-logo svg {
  width: 20px;
  height: 20px;
}

.navbar-title {
  display: flex;
  flex-direction: column;
  line-height: 1.25;
}

.navbar-title .product-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-foreground);
}

.navbar-title .product-slogan {
  font-size: 12px;
  color: var(--color-muted-foreground);
}

.navbar-version {
  border-radius: 9999px;
  border: 1px solid var(--color-border);
  background-color: var(--color-secondary);
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-secondary-foreground);
}

/* ----- 占位卡片（T1 骨架可见性） ----- */
.card-placeholder {
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-xl);
  background-color: var(--color-card);
  padding: 32px 24px;
  min-height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-placeholder .placeholder-text {
  font-size: 14px;
  color: var(--color-muted-foreground);
  text-align: center;
  line-height: 1.6;
}

.card-placeholder .placeholder-label {
  display: block;
  font-size: 12px;
  color: var(--color-border);
  margin-top: 4px;
}

/* 预览区占位更大 */
#preview-card.card-placeholder {
  min-height: 320px;
}

/* ----- 提示卡片（底部） ----- */
#tips-card {
  margin-top: 24px;
}
</style>
</head>
<body>

<!-- ============================================================
     导航栏 #navbar
     ============================================================ -->
<header id="navbar">
  <div class="navbar-inner">
    <div class="navbar-left">
      <!-- Logo -->
      <div class="navbar-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="6" width="18" height="12" rx="2" />
          <path d="M3 12h18" />
        </svg>
      </div>
      <!-- 产品信息 -->
      <div class="navbar-title">
        <span class="product-name">会议桌牌自动排序工具</span>
        <span class="product-slogan">输入人数，一键生成符合座次礼仪的会议平面图</span>
      </div>
    </div>
    <!-- 版本标签 -->
    <span class="navbar-version">MVP v1.0</span>
  </div>
</header>

<!-- ============================================================
     页面容器
     ============================================================ -->
<div class="page-container">

  <!-- 主内容区：双栏 -->
  <div id="main">

    <!-- ========== 左侧栏 #left-panel ========== -->
    <aside id="left-panel">
      <!-- 输入区占位（T2/T6 实现） -->
      <div id="input-card" class="card-placeholder">
        <div class="placeholder-text">
          输入区<br>
          <span class="placeholder-label">客方/主方步进器 + 快捷案例（待 T2、T6 实现）</span>
        </div>
      </div>

      <!-- 座次规则说明占位（T7 实现） -->
      <div id="rules-card" class="card-placeholder">
        <div class="placeholder-text">
          座次规则<br>
          <span class="placeholder-label">5 条排序规则（待 T7 实现）</span>
        </div>
      </div>
    </aside>

    <!-- ========== 右侧栏 #right-panel ========== -->
    <section id="right-panel">
      <!-- 预览区占位（T3/T4 实现 SVG） -->
      <div id="preview-card" class="card-placeholder">
        <div class="placeholder-text">
          SVG 平面图预览区<br>
          <span class="placeholder-label">房间 · 会议桌 · 座位（待 T3、T4 实现）</span>
        </div>
      </div>

      <!-- 操作按钮区占位（T6/T9 实现） -->
      <div id="actions-area" class="card-placeholder" style="min-height:60px">
        <div class="placeholder-text">
          操作按钮<br>
          <span class="placeholder-label">下载 SVG / 打印（待 T6、T9 实现）</span>
        </div>
      </div>
    </section>

  </div><!-- /#main -->

  <!-- 使用提示占位（T8 实现） -->
  <div id="tips-card" class="card-placeholder" style="min-height:100px">
    <div class="placeholder-text">
      使用提示<br>
      <span class="placeholder-label">3 条实用提示（待 T8 实现）</span>
    </div>
  </div>

</div><!-- /.page-container -->

</body>
</html>
